<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>El Juego de Jeromín: Lluvia de Lentejas</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#f0ede6; display:flex; flex-direction:column; align-items:center; justify-content:space-between; min-height:100dvh; min-height:100vh; overflow:hidden; font-family:'Courier New',monospace; color:#111; touch-action:none; padding:4px; }
  
  #banner-wrap { width:100%; max-width:520px; margin-bottom:2px; flex-shrink:1; }
  #banner-wrap img { width:100%; max-height:12vh; object-fit:contain; display:block; border-radius:6px; box-shadow:0 2px 8px rgba(131,57,136,0.18); }
  
  #canal-btn { display:block; text-align:center; background:#833988; color:#fff; font-family:'Courier New',monospace; font-size:calc(0.65em + 0.4vw); font-weight:bold; text-decoration:none; padding:6px 12px; border-radius:20px; margin-bottom:4px; letter-spacing:.02em; box-shadow:0 2px 6px rgba(131,57,136,0.3); width:100%; max-width:520px; flex-shrink:0; }
  #canal-btn:active { background:#5a2060; }
  
  #hud { display:flex; gap:12px; margin-bottom:4px; font-size:calc(0.85em + 0.3vw); align-items:center; flex-shrink:0; }
  #lives-display { display:flex; gap:3px; align-items:center; }
  #lives-display img { width:24px; height:24px; object-fit:contain; float:left; }
  #score-span { color:#833988; font-weight:bold; }
  #level-span { color:#a2b468; font-weight:bold; }
  
  #game-wrap { position:relative; width:100%; max-width:520px; display:flex; justify-content:center; align-items:center; flex-grow:1; min-height:0; }
  canvas { display:block; border:3px solid #833988; background:#f7f4ee; box-shadow:0 0 16px rgba(131,57,136,0.2); max-width:100%; max-height:100%; object-fit:contain; }
  
  /* Controles ergonómicos: Disparar izquierda, movimiento derecha */
  #controls { display:flex; align-items:center; justify-content:space-between; width:100%; max-width:520px; padding:6px 8px; gap:8px; flex-shrink:0; }
  .dir-group { display:flex; gap:10px; }
  
  .btn { background:rgba(162,180,104,0.22); border:2.5px solid #a2b468; border-radius:50%; color:#a2b468; font-size:1.8em; width:17vw; height:17vw; max-width:74px; max-height:74px; display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; cursor:pointer; flex-shrink:0; font-weight:bold; }
  .btn:active { background:rgba(162,180,104,0.55); }
  
  #btn-shoot { width:21vw; height:21vw; max-width:86px; max-height:86px; font-size:1.6em; border-color:#833988; background:rgba(131,57,136,0.12); color:#833988; line-height:1.1; }
  #btn-shoot:active { background:rgba(131,57,136,0.35); }
  
  .overlay-panel { display:none; position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(240,237,230,0.97); flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:12px; overflow-y:auto; z-index:10; }
  .overlay-panel.visible { display:flex; }
  
  #instructions-panel h2 { color:#833988; font-size:calc(0.9em + 0.5vw); text-align:center; margin-bottom:2px; }
  #instructions-panel p { color:#111; font-size:calc(0.7em + 0.3vw); line-height:1.5; max-width:100%; text-align:center; border:2px solid #a2b468; border-radius:8px; padding:10px; background:rgba(162,180,104,0.1); }
  
  #defenestration-panel h2 { color:#833988; font-size:calc(0.9em + 0.5vw); text-align:center; line-height:1.4; }
  #defenestration-panel .lives-left { color:#a2b468; font-size:0.9em; font-weight:bold; }
  
  #gameover-panel h2 { color:#833988; font-size:calc(1em + 0.4vw); text-align:center; }
  #gameover-panel .score-final { color:#a2b468; font-size:1em; font-weight:bold; }
  
  #name-input { background:#fff; border:2px solid #833988; color:#111; font-family:'Courier New',monospace; font-size:0.9em; padding:6px 10px; border-radius:4px; text-align:center; width:80%; max-width:200px; outline:none; }
  #name-input::placeholder { color:#aaa; }
  
  #ranking { width:100%; max-width:260px; margin: 2px 0; }
  #ranking h3 { color:#833988; font-size:.85em; margin-bottom:4px; text-align:center; border-bottom:2px solid #a2b468; padding-bottom:2px; }
  #ranking-list { list-style:none; width:100%; }
  #ranking-list li { display:flex; justify-content:space-between; font-size:.75em; padding:2px 0; border-bottom:1px solid #a2b46844; color:#111; }
  #ranking-list li:first-child { color:#833988; font-weight:bold; }
  #ranking-list li .pos { color:#a2b468; width:18px; font-weight:bold; }
  #ranking-list li .name { flex:1; padding-left:4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #ranking-list li .pts { color:#833988; font-weight:bold; }
  
  #saved-msg { color:#a2b468; font-size:.8em; min-height:1em; font-weight:bold; }
  
  .action-btn { font-family:'Courier New',monospace; font-size:0.9em; cursor:pointer; padding:8px 20px; border-radius:6px; border:none; font-weight:bold; letter-spacing:.03em; flex-shrink:0; }
  .btn-purple { background:#833988; color:#fff; }
  .btn-purple:active { background:#5a2060; }
  .btn-green { background:#a2b468; color:#fff; }
  .btn-green:active { background:#728040; }
</style>
</head>
<body>

<div id="banner-wrap">
  <img src="CABECERA.png" alt="El Juego de Jeromín: Lluvia de Lentejas" onerror="this.style.display='none'">
</div>
<a id="canal-btn" href="https://youtube.com/@javiuve-truffautenpancorbo?si=A7UYQj9V6oG5OAQX" target="_blank" rel="noopener">📺 Visitar canal Javi UVE · Truffaut en PANCORBO</a>
<div id="hud">
  <div id="lives-display"></div>
  <span id="score-span">Puntos: 0</span>
  <span id="level-span">Nivel: 1</span>
</div>

<div id="game-wrap">

  <div class="overlay-panel" id="instructions-panel">
