<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>El Juego de Jeromín: Lluvia de Lentejas</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#f0ede6; display:flex; flex-direction:column; align-items:center; justify-content:space-between; min-height:100dvh; min-height:100vh; overflow:hidden; font-family:'Courier New',monospace; color:#111; touch-action:none; padding:4px; }
  
  #banner-wrap { width:100%; max-width:520px; margin-bottom:2px; flex-shrink:1; }
  #banner-wrap img { width:100%; max-height:12vh; object-fit:contain; display:block; border-radius:6px; box-shadow:0 2px 8px rgba(131,57,136,0.18); }
  
  #canal-btn { display:block; text-align:center; background:#833988; color:#fff; font-family:'Courier New',monospace; font-size:calc(0.65em + 0.4vw); font-weight:bold; text-decoration:none; padding:6px 12px; border-radius:20px; margin-bottom:4px; letter-spacing:.02em; box-shadow:0 2px 6px rgba(131,57,136,0.3); width:100%; max-width:520px; flex-shrink:0; }
  #canal-btn:active { background:#5a2060; }
  
  #hud { display:flex; gap:12px; margin-bottom:4px; font-size:calc(0.85em + 0.3vw); align-items:center; flex-shrink:0; }
  #lives-display { display:flex; gap:3px; align-items:center; }
  #lives-display img { width:24px; height:24px; object-fit:contain; }
  #score-span { color:#833988; font-weight:bold; }
  #level-span { color:#a2b468; font-weight:bold; }
  
  #game-wrap { position:relative; width:100%; max-width:520px; display:flex; justify-content:center; align-items:center; flex-grow:1; min-height:0; }
  canvas { display:block; border:3px solid #833988; background:#f7f4ee; box-shadow:0 0 16px rgba(131,57,136,0.2); max-width:100%; max-height:100%; object-fit:contain; }
  
  /* Controles: Disparar a la izquierda, movimiento a la derecha */
  #controls { display:flex; align-items:center; justify-content:space-between; width:100%; max-width:520px; padding:6px 8px; gap:8px; flex-shrink:0; }
  .dir-group { display:flex; gap:10px; }
  
  .btn { background:rgba(162,180,104,0.22); border:2.5px solid #a2b468; border-radius:50%; color:#a2b468; font-size:1.8em; width:17vw; height:17vw; max-width:74px; max-height:74px; display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; cursor:pointer; flex-shrink:0; font-weight:bold; }
  .btn:active { background:rgba(162,180,104,0.55); }
  
  #btn-shoot { width:21vw; height:21vw; max-width:86px; max-height:86px; font-size:1.6em; border-color:#833988; background:rgba(131,57,136,0.12); color:#833988; line-height:1.1; }
  #btn-shoot:active { background:rgba(131,57,136,0.35); }
  
  .overlay-panel { display:none; position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(240,237,230,0.97); flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:12px; overflow-y:auto; z-index:10; }
  .overlay-panel
